server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve WebP images with correct MIME type
    types {
        text/html                html htm;
        text/css                 css;
        application/javascript   js;
        application/json         json;
        image/webp               webp;
        image/jpeg               jpg jpeg;
        image/png                png;
        image/gif                gif;
        image/svg+xml            svg;
        font/woff2               woff2;
    }

    # Cache static assets
    location ~* \.(css|js|webp|jpg|jpeg|png|gif|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JSON files — no cache (manifest can update)
    location ~* \.json$ {
        expires off;
        add_header Cache-Control "no-cache";
    }

    # All other requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
